<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0" />
  <title>Elite — Al-Naqsh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --ink: #1a1208;
      --ink2: #f2ede4;
      --ink3: #ede7db;
      --ink4: #e6ddd0;
      --gold: #B8872A;
      --gold2: #D4A850;
      --gold3: rgba(184, 135, 42, 0.10);
      --ivory: #faf8f4;
      --ivory2: #5a4a30;
      --ivory3: rgba(250, 248, 244, 0.8);
      --terra: #7A3E26;
      --terra2: rgba(122, 62, 38, 0.1);
      --dim: #8a7a60;
      --stone: #a09080;
      --stone2: #7a6a50;
      --border: rgba(184, 135, 42, 0.18);
      --border2: rgba(184, 135, 42, 0.09);
      --fd: 'EB Garamond', Georgia, serif;
      --fu: 'Space Grotesk', system-ui, sans-serif;
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: #faf8f4;
      color: var(--ink);
      font-family: var(--fu);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      cursor: none
    }

    ::-webkit-scrollbar {
      width: 3px
    }

    ::-webkit-scrollbar-track {
      background: #faf8f4
    }

    ::-webkit-scrollbar-thumb {
      background: var(--gold);
      border-radius: 2px
    }

    /* Custom cursor */
    #cur {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .2s, height .2s
    }

    #cur-r {
      position: fixed;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(196, 144, 46, .45);
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: all .1s ease
    }

    body:has(button:hover) #cur,
    body:has(a:hover) #cur {
      width: 14px;
      height: 14px;
      background: var(--gold2)
    }

    body:has(button:hover) #cur-r,
    body:has(a:hover) #cur-r {
      width: 52px;
      height: 52px;
      border-color: rgba(196, 144, 46, .25)
    }

    /* Noise */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 997;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      opacity: .4
    }

    /* Geometric pattern overlay */
    .geo-bg {
      position: relative
    }

    .geo-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='rgba(196,144,46,0.06)' stroke-width='0.5'%3E%3Cpolygon points='40,4 52,16 68,16 68,32 52,44 40,56 28,44 12,44 12,28 28,16'/%3E%3Cpolygon points='40,12 50,20 62,20 62,32 50,40 40,52 30,40 18,40 18,28 30,20'/%3E%3Cline x1='40' y1='4' x2='40' y2='56'/%3E%3Cline x1='12' y1='28' x2='68' y2='28'/%3E%3Cline x1='28' y1='16' x2='52' y2='44'/%3E%3Cline x1='52' y1='16' x2='28' y2='44'/%3E%3C/g%3E%3C/svg%3E");
      background-size: 80px 80px;
      pointer-events: none;
      opacity: .6;
      z-index: 0
    }

    /* Anims */
    @keyframes fu {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fi {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideR {
      from {
        transform: translateX(100%)
      }

      to {
        transform: translateX(0)
      }
    }

    @keyframes spinSlow {
      from {
        transform: rotate(0deg)
      }

      to {
        transform: rotate(360deg)
      }
    }

    @keyframes lineGrow {
      from {
        transform: scaleX(0);
        transform-origin: left
      }

      to {
        transform: scaleX(1);
        transform-origin: left
      }
    }

    @keyframes diamondPulse {

      0%,
      100% {
        transform: rotate(45deg) scale(1)
      }

      50% {
        transform: rotate(45deg) scale(1.03)
      }
    }

    @keyframes tk {
      from {
        transform: translateX(0)
      }

      to {
        transform: translateX(-50%)
      }
    }

    @keyframes mq {
      from {
        transform: translateX(0)
      }

      to {
        transform: translateX(-50%)
      }
    }

    .afu {
      animation: fu .8s cubic-bezier(.22, 1, .36, 1) both
    }

    .afi {
      animation: fi .6s ease both
    }

    .tk-inner {
      display: inline-flex;
      white-space: nowrap;
      animation: tk 30s linear infinite
    }

    .mq-i {
      animation: mq 24s linear infinite
    }

    /* Ornate button */
    .orn-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: var(--fu);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      padding: 13px 32px;
      cursor: none;
      transition: all .4s ease;
      overflow: hidden;
    }

    .orn-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .4s cubic-bezier(.22, 1, .36, 1)
    }

    .orn-btn:hover {
      color: var(--ink)
    }

    .orn-btn:hover::before {
      transform: scaleX(1)
    }

    .orn-btn span {
      position: relative;
      z-index: 1
    }

    /* Corner gems on button */
    .orn-btn::after {
      content: '✦';
      position: absolute;
      top: 3px;
      right: 6px;
      font-size: 7px;
      color: var(--gold);
      opacity: .5;
      transition: opacity .3s
    }

    .orn-btn:hover::after {
      opacity: 0
    }

    .solid-orn {
      background: var(--gold);
      color: var(--ink);
      font-family: var(--fu);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .22em;
      text-transform: uppercase;
      border: none;
      padding: 15px 40px;
      cursor: none;
      transition: background .3s;
      position: relative
    }

    .solid-orn:hover {
      background: var(--gold2)
    }

    /* Diamond frame */
    .diamond-frame {
      position: relative;
      transform: rotate(45deg);
      overflow: hidden;
    }

    .diamond-frame img {
      transform: rotate(-45deg) scale(1.42);
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .7s cubic-bezier(.22, 1, .36, 1);
    }

    .diamond-frame:hover img {
      transform: rotate(-45deg) scale(1.52)
    }

    /* Ornate border corners */
    .orn-box {
      position: relative
    }

    .orn-box::before,
    .orn-box::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      z-index: 2;
      pointer-events: none
    }

    .orn-box::before {
      top: 0;
      left: 0;
      border-top: 1px solid var(--gold);
      border-left: 1px solid var(--gold)
    }

    .orn-box::after {
      bottom: 0;
      right: 0;
      border-bottom: 1px solid var(--gold);
      border-right: 1px solid var(--gold)
    }

    /* Float input */
    .fw {
      position: relative
    }

    .fi {
      width: 100%;
      background: var(--ink3);
      border: 1px solid var(--border);
      color: var(--ivory);
      font-family: var(--fu);
      font-size: 13px;
      font-weight: 300;
      padding: 20px 16px 8px;
      outline: none;
      transition: border-color .3s;
      -webkit-appearance: none
    }

    .fi:focus {
      border-color: var(--gold)
    }

    .fl {
      position: absolute;
      left: 16px;
      top: 14px;
      font-size: 9px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--dim);
      pointer-events: none;
      transition: all .25s
    }

    .fi:focus~.fl,
    .fi:not(:placeholder-shown)~.fl {
      top: 5px;
      font-size: 7px;
      color: var(--gold)
    }

    /* Hr */
    .hr {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent)
    }

    /* Tag */
    .tag {
      display: inline-block;
      padding: 3px 10px;
      border: 1px solid rgba(196, 144, 46, .3);
      font-family: var(--fu);
      font-size: 7px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold)
    }

    /* Acc */
    .acc-b {
      max-height: 0;
      overflow: hidden;
      transition: max-height .5s cubic-bezier(.22, 1, .36, 1)
    }

    .acc-b.open {
      max-height: 400px
    }

    /* Size btn */
    .sz {
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ivory2);
      font-family: var(--fu);
      font-size: 12px;
      cursor: none;
      transition: all .25s
    }

    .sz:hover {
      border-color: var(--gold);
      color: var(--gold)
    }

    .sz.on {
      border-color: var(--gold);
      background: var(--gold3);
      color: var(--gold)
    }

    /* Filter pill */
    .fp {
      padding: 8px 18px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--dim);
      font-family: var(--fu);
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
      cursor: none;
      transition: all .25s;
      white-space: nowrap
    }

    .fp:hover {
      border-color: var(--border);
      color: var(--ivory2)
    }

    .fp.on {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold3)
    }

    /* Cart */
    .c-ov {
      position: fixed;
      inset: 0;
      background: rgba(20, 14, 6, .45);
      backdrop-filter: blur(10px);
      z-index: 200;
      animation: fi .3s ease
    }

    .c-dr {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: min(420px, 100vw);
      background: rgba(250, 248, 244, .98);
      border-left: 1px solid var(--border);
      animation: slideR .5s cubic-bezier(.22, 1, .36, 1);
      display: flex;
      flex-direction: column
    }

    /* Gallery dot */
    .gdot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--dim);
      cursor: none;
      transition: all .3s;
      border: none
    }

    .gdot.on {
      background: var(--gold);
      width: 18px;
      border-radius: 2px
    }

    /* Step */
    .sdot {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      border: 1px solid var(--border);
      color: var(--dim);
      transition: all .3s;
      border-radius: 0
    }

    .sdot.act {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold3)
    }

    .sdot.done {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--ink)
    }

    /* Mob nav */
    .mob-nav {
      position: fixed;
      inset: 0;
      background: #faf8f4;
      z-index: 180;
      animation: fi .3s ease
    }

    /* Geometric decorative line */
    .geo-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), rgba(196, 144, 46, .3), transparent);
      position: relative
    }

    .geo-line::before,
    .geo-line::after {
      content: '✦';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 8px;
      line-height: 1
    }

    .geo-line::before {
      left: 0
    }

    .geo-line::after {
      right: 0
    }

    @media(max-width:767px) {
      body {
        cursor: auto
      }

      #cur,
      #cur-r {
        display: none
      }
    }
  </style>
</head>

<body>
  <div id="cur"></div>
  <div id="cur-r"></div>
  <div id="root"></div>

  <svg style="position:absolute;width:0;height:0;overflow:hidden">
    <defs>
      <pattern id="starPat" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
        <g fill="none" stroke="rgba(196,144,46,0.07)" strokeWidth="0.6">
          <!-- 8-pointed star -->
          <polygon points="50,5 61,29 87,29 66,46 74,72 50,57 26,72 34,46 13,29 39,29" />
          <!-- Inner octagon -->
          <polygon points="50,18 60,27 72,27 72,39 60,50 50,58 40,50 28,50 28,38 40,27" />
          <!-- Connecting lines -->
          <line x1="50" y1="5" x2="50" y2="95" />
          <line x1="5" y1="50" x2="95" y2="50" />
          <line x1="15" y1="15" x2="85" y2="85" />
          <line x1="85" y1="15" x2="15" y2="85" />
        </g>
      </pattern>
    </defs>
  </svg>

  <script>
    const c = document.getElementById('cur'), cr = document.getElementById('cur-r');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; c.style.left = mx + 'px'; c.style.top = my + 'px' });
    (function loop() { rx += (mx - rx) * .1; ry += (my - ry) * .1; cr.style.left = rx + 'px'; cr.style.top = ry + 'px'; requestAnimationFrame(loop) })();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const IMGS = {
      oxford: 'https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=800&q=85&auto=format&fit=crop',
      derby: 'https://images.unsplash.com/photo-1533867617858-e7b97e060509?w=800&q=85&auto=format&fit=crop',
      loafer: 'https://images.unsplash.com/photo-1600269452121-4f2416e55c28?w=800&q=85&auto=format&fit=crop',
      boot: 'https://images.unsplash.com/photo-1560343776-97e7d202ff0e?w=800&q=85&auto=format&fit=crop',
      mule: 'https://images.unsplash.com/photo-1560343776-97e7d202ff0e?w=800&q=85&auto=format&fit=crop',
      chelsea: 'https://images.unsplash.com/photo-1518639192441-8fce0a366e2e?w=800&q=85&auto=format&fit=crop',
    };
    const GALLERY = [IMGS.oxford, IMGS.derby, IMGS.loafer, IMGS.boot];
    const PRODUCTS = [
      { id: 1, name: 'Al-Mahmal Oxford', price: 2800, tag: 'Signature', leather: 'Camel Nappa', style: 'Oxford', sizes: [40, 41, 42, 43, 44, 45], image: IMGS.oxford, num: 'I' },
      { id: 2, name: 'Najd Derby', price: 2200, tag: 'New', leather: 'Goat Suede', style: 'Derby', sizes: [39, 40, 41, 42, 43, 44], image: IMGS.derby, num: 'II' },
      { id: 3, name: 'Hijaz Loafer', price: 1950, tag: 'Bestseller', leather: 'Calf Leather', style: 'Loafer', sizes: [40, 41, 42, 43, 44], image: IMGS.loafer, num: 'III' },
      { id: 4, name: 'Rub Al Khali Boot', price: 3400, tag: 'Limited', leather: 'Camel Full-Grain', style: 'Boot', sizes: [41, 42, 43, 44, 45], image: IMGS.boot, num: 'IV' },
      { id: 5, name: 'Medina Mule', price: 1600, tag: '', leather: 'Goat Suede', style: 'Loafer', sizes: [39, 40, 41, 42, 43], image: IMGS.mule, num: 'V' },
      { id: 6, name: 'Quraish Chelsea', price: 2650, tag: 'New', leather: 'Calf Leather', style: 'Boot', sizes: [40, 41, 42, 43, 44, 45], image: IMGS.chelsea, num: 'VI' },
    ];

    /* Geometric ornament SVG */
    function GeoOrn({ size = 40, opacity = 0.4, spin = false }) {
      return (
        <svg width={size} height={size} viewBox="0 0 40 40" style={{ flexShrink: 0, animation: spin ? 'spinSlow 20s linear infinite' : 'none', opacity }}>
          <g fill="none" stroke="var(--gold)" strokeWidth="0.7">
            <polygon points="20,2 26,10 36,10 36,20 26,30 20,38 14,30 4,30 4,20 14,10" />
            <polygon points="20,8 25,14 32,14 32,20 25,27 20,32 15,27 8,27 8,20 15,14" />
            <circle cx="20" cy="20" r="4" fill="var(--gold)" fillOpacity="0.2" />
            <line x1="20" y1="2" x2="20" y2="38" strokeDasharray="2,4" />
            <line x1="2" y1="20" x2="38" y2="20" strokeDasharray="2,4" />
          </g>
        </svg>
      );
    }

    /* Ornate divider */
    function OrnDivider() {
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '4px 0' }}>
          <div style={{ flex: 1, height: '1px', background: 'linear-gradient(to right,transparent,var(--border))' }} />
          <GeoOrn size={24} opacity={0.6} />
          <div style={{ flex: 1, height: '1px', background: 'linear-gradient(to left,transparent,var(--border))' }} />
        </div>
      );
    }

    /* NAV */
    function Nav({ page, setPage, cartCount, onCart }) {
      const [sc, setSc] = useState(false); const [mob, setMob] = useState(false);
      useEffect(() => { const h = () => setSc(window.scrollY > 40); window.addEventListener('scroll', h); return () => window.removeEventListener('scroll', h) }, []);
      const go = id => { setPage(id); setMob(false); window.scrollTo(0, 0) };
      return (<>
        <nav style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 150, padding: '16px 40px', background: sc ? 'rgba(240,235,220,.95)' : 'transparent', backdropFilter: sc ? 'blur(20px)' : 'none', borderBottom: sc ? '1px solid var(--border)' : '1px solid transparent', transition: 'all .4s', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          {/* Logo */}
          <button onClick={() => go('home')} style={{ background: 'none', border: 'none', cursor: 'none', padding: 0, display: 'flex', alignItems: 'center', gap: 10 }}>
            <GeoOrn size={28} opacity={0.8} />
            <div>
              <div style={{ fontFamily: 'var(--fd)', fontSize: 18, letterSpacing: '.12em', color: 'var(--ivory)', fontWeight: 400 }}>ELITE</div>
              <div style={{ fontFamily: 'var(--fu)', fontSize: 7, letterSpacing: '.38em', textTransform: 'uppercase', color: 'var(--dim)', marginTop: 1 }}>Al-Naqsh · Since 1962</div>
            </div>
          </button>

          <div style={{ display: 'flex', gap: 36 }} className="dn">
            {[['collection', 'Collection'], ['story', 'Our Story'], ['contact', 'Contact']].map(([id, l]) => (
              <button key={id} onClick={() => go(id)} style={{ background: 'none', border: 'none', cursor: 'none', fontFamily: 'var(--fu)', fontSize: 9, letterSpacing: '.18em', textTransform: 'uppercase', fontWeight: page === id ? 500 : 300, color: page === id ? 'var(--gold)' : 'var(--dim)', transition: 'color .25s', position: 'relative', padding: '4px 0' }}>
                {l}{page === id && <span style={{ position: 'absolute', bottom: -3, left: 0, right: 0, height: '1px', background: 'var(--gold)', animation: 'lineGrow .4s ease' }} />}
              </button>
            ))}
          </div>

          <div style={{ display: 'flex', gap: 18, alignItems: 'center' }}>
            <button onClick={onCart} style={{ background: 'none', border: 'none', cursor: 'none', position: 'relative', padding: 4 }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ivory)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" /><line x1="3" y1="6" x2="21" y2="6" /><path d="M16 10a4 4 0 01-8 0" /></svg>
              {cartCount > 0 && <span style={{ position: 'absolute', top: -2, right: -2, width: 15, height: 15, borderRadius: 0, background: 'var(--gold)', color: 'var(--ink)', fontSize: 8, fontFamily: 'var(--fu)', fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{cartCount}</span>}
            </button>

    /* CART */
    function CartDrawer({ cart, onClose, onRemove, setPage }) {
      const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
      return (<div className="c-ov" onClick={e => e.target === e.currentTarget && onClose()}>
        <div className="c-dr">
          <div style={{ padding: '24px 24px 20px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <GeoOrn size={22} opacity={0.7} />
              <div><div style={{ fontFamily: 'var(--fd)', fontSize: 20, color: 'var(--ivory)', fontWeight: 400 }}>Your Selection</div><div style={{ fontFamily: 'var(--fu)', fontSize: 7, letterSpacing: '.2em', textTransform: 'uppercase', color: 'var(--dim)', marginTop: 1 }}>{cart.length} piece{cart.length !== 1 ? 's' : ''} reserved</div></div>
            </div>
            <button onClick={onClose} style={{ width: 34, height: 34, background: 'none', border: '1px solid var(--border)', cursor: 'none', color: 'var(--dim)', fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'border-color .25s' }} onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--gold)'} onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}>✕</button>
          </div>
          <div style={{ flex: 1, overflowY: 'auto' }}>
            {cart.length === 0 ? <div style={{ padding: '60px 24px', textAlign: 'center' }}><GeoOrn size={48} opacity={0.2} spin /><div style={{ fontFamily: 'var(--fd)', fontSize: 26, color: 'var(--dim)', marginTop: 16, fontStyle: 'italic' }}>Empty</div></div>

                <div key={item.id + item.size} style={{ padding: '16px 24px', borderBottom: '1px solid var(--border2)', display: 'flex', gap: 12 }}>
                  <div style={{ width: 62, height: 62, overflow: 'hidden', flexShrink: 0, background: '#ede7db' }}><img src={item.image} alt={item.name} style={{ width: '100%', height: '100%', objectFit: 'cover' }} onError={e => e.currentTarget.style.display = 'none'} /></div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: 'var(--fd)', fontSize: 15, color: 'var(--ivory)', marginBottom: 2 }}>{item.name}</div>
                    <div style={{ fontFamily: 'var(--fu)', fontSize: 8, color: 'var(--dim)', textTransform: 'uppercase', letterSpacing: '.1em', marginBottom: 6 }}>Size {item.size} · {item.leather}</div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <span style={{ fontFamily: 'var(--fd)', fontSize: 15, color: 'var(--gold)' }}>SAR {(item.price * item.qty).toLocaleString()}</span>

                    </div>

          </div>}
        </div>
      </div>);
    }

    /* CHECKOUT */
    function CheckoutPage({ cart, setPage }) {
      const [step, setStep] = useState(0); const [form, setForm] = useState({ firstName: '', lastName: '', email: '', phone: '', address: '', city: '', country: 'Qatar', cardNum: '', expiry: '', cvv: '', name: '' }); const [placed, setPlaced] = useState(false);

          <p style={{ fontFamily: 'var(--fd)', fontStyle: 'italic', fontSize: 18, color: 'var(--gold)', marginBottom: 28 }}>"We'll notify you when it begins its journey."</p>

          <div style={{ marginTop: 24 }}><button className="solid-orn" onClick={() => { setPage('collection'); window.scrollTo(0, 0) }} style={{ padding: '14px 40px', fontSize: 9 }}>Continue Browsing</button></div>
        </div>
      </div>);
      return (<div style={{ paddingTop: 80, minHeight: '100vh' }}>
        <div style={{ maxWidth: 1100, margin: '0 auto', padding: '32px 24px 80px', display: 'grid' }} className="co-g">

            <div style={{ textAlign: 'center', marginBottom: 32 }}>
              <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 12 }}><GeoOrn size={36} opacity={0.7} /></div>

              <div style={{ fontFamily: 'var(--fu)', fontSize: 7, letterSpacing: '.3em', textTransform: 'uppercase', color: 'var(--dim)', marginTop: 2 }}>Secure Checkout</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 32 }}>
              {steps.map((s, i) => (
                <React.Fragment key={s}>
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5, cursor: i < step ? 'none' : 'default' }} onClick={() => i < step && setStep(i)}>
                    <div className={'sdot' + (i === step ? ' act' : i < step ? ' done' : '')}>{i < step ? '✓' : i + 1}</div>
                    <span style={{ fontFamily: 'var(--fu)', fontSize: 7, letterSpacing: '.18em', textTransform: 'uppercase', color: i === step ? 'var(--gold)' : 'var(--dim)' }}>{s}</span>
                  </div>
                  {i < steps.length - 1 && <div style={{ flex: 1, height: 1, background: i < step ? 'var(--gold)' : 'var(--border)', margin: '0 10px 18px' }} />}
                </React.Fragment>
              ))}
            </div>
            <div className="afu" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              {step === 0 && [['First Name', 'firstName', 1], ['Last Name', 'lastName', 1], ['Email', 'email', 2, 'email'], ['Phone', 'phone', 2, 'tel']].map(([l, k, cs, t = 'text']) => (
                <div key={k} className="fw" style={{ gridColumn: `span ${cs}` }}><input className="fi" type={t} value={form[k]} onChange={e => set(k, e.target.value)} placeholder=" " /><label className="fl">{l}</label></div>

              ))}
            </div>
            <div style={{ display: 'flex', gap: 8, marginTop: 22 }}>
              {step > 0 && <button className="orn-btn" onClick={() => setStep(s => s - 1)} style={{ padding: '12px 20px', flex: 1, fontSize: 9 }}><span>Back</span></button>}
              <button className="solid-orn" onClick={() => step < steps.length - 1 ? setStep(s => s + 1) : setPlaced(true)} style={{ padding: '14px', flex: 2, fontSize: 9, letterSpacing: '.22em' }}>{step < steps.length - 1 ? 'Continue' : 'Place Order'}</button>

                  <div style={{ width: 56, height: 56, overflow: 'hidden', flexShrink: 0, background: '#ede7db' }}><img src={item.image} alt={item.name} style={{ width: '100%', height: '100%', objectFit: 'cover' }} onError={e => e.currentTarget.style.display = 'none'} /></div>
                  <div style={{ flex: 1 }}><div style={{ fontFamily: 'var(--fd)', fontSize: 13, color: 'var(--ivory)', marginBottom: 2 }}>{item.name}</div><div style={{ fontFamily: 'var(--fu)', fontSize: 8, color: 'var(--dim)' }}>Size {item.size} · Qty {item.qty}</div></div>

              ))}
              <div style={{ margin: '8px 0' }}><OrnDivider /></div>
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <span style={{ fontFamily: 'var(--fu)', fontSize: 9, textTransform: 'uppercase', letterSpacing: '.1em', color: 'var(--ivory)' }}>Total</span>
                <span style={{ fontFamily: 'var(--fd)', fontSize: 20, color: 'var(--gold)' }}>SAR {total.toLocaleString()}</span>
              </div>
            </div>
          </div>
        </div>
        <style>{`@media(min-width:900px){.co-g{grid-template-columns:1fr 360px!important;gap:40px}}`}</style>
      </div>);

        </div>
        <div style={{ padding: '60px 40px', textAlign: 'center', background: '#f2ede4', position: 'relative', overflow: 'hidden' }}>
          <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none', opacity: .3 }} preserveAspectRatio="xMidYMid slice"><rect width="100%" height="100%" fill="url(#starPat)" /></svg>
          <div style={{ position: 'relative', zIndex: 1 }}>
            <OrnDivider />
            <p style={{ fontFamily: 'var(--fd)', fontStyle: 'italic', fontSize: 'clamp(18px,3vw,34px)', fontWeight: 400, color: 'var(--ivory)', lineHeight: 1.4, maxWidth: 660, margin: '20px auto' }}>"A shoe is not a product.<br /><span style={{ color: 'var(--gold)' }}>It is the autobiography of a craftsman."</span></p>
            <p style={{ fontFamily: 'var(--fu)', fontSize: 8, letterSpacing: '.22em', textTransform: 'uppercase', color: 'var(--dim)', marginTop: 0, marginBottom: 16 }}>— Khalid Al-Rashidi, Founder</p>
            <OrnDivider />
          </div>
        </div>
        <style>{`@media(min-width:768px){.st-row{grid-template-columns:1fr 1fr!important}}`}</style>
      </div>);
    }

    /* CONTACT */
    function ContactPage() {
      const [form, setForm] = useState({ name: '', email: '', phone: '', subject: '', message: '' }); const [done, setDone] = useState(false);
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      if (done) return (<div style={{ paddingTop: 80, minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '80px 24px' }}>
        <div style={{ textAlign: 'center', maxWidth: 420 }} className="afu">
          <GeoOrn size={52} opacity={0.8} spin />
          <div style={{ fontFamily: 'var(--fd)', fontStyle: 'italic', fontSize: 18, color: 'var(--gold)', margin: '16px 0 12px' }}>Message Received</div>
          <h2 style={{ fontFamily: 'var(--fd)', fontSize: 36, fontWeight: 400, color: 'var(--ivory)', marginBottom: 10 }}>A Client Advisor<br />Will Be in Touch</h2>
          <OrnDivider />
        </div>
      </div>);
      return (<div style={{ paddingTop: 80, minHeight: '100vh' }}>
        <div style={{ padding: '48px 40px 0', maxWidth: 560, margin: '0 auto', textAlign: 'center' }} className="afu">
          <GeoOrn size={44} opacity={0.7} />
          <div style={{ fontFamily: 'var(--fu)', fontSize: 8, letterSpacing: '.35em', textTransform: 'uppercase', color: 'var(--gold)', margin: '14px 0 10px' }}>Personal Service</div>
          <h1 style={{ fontFamily: 'var(--fd)', fontSize: 'clamp(30px,5.5vw,58px)', fontWeight: 400, color: 'var(--ivory)', lineHeight: 1, marginBottom: 12 }}>Speak with a<br /><em style={{ color: 'var(--gold)', fontStyle: 'italic' }}>Client Advisor</em></h1>
          <p style={{ fontFamily: 'var(--fu)', fontSize: 12, color: 'var(--dim)', lineHeight: 1.9, marginBottom: 32 }}>Every inquiry is handled personally. Whether bespoke commission, sizing counsel, or craft question — we are at your service.</p>
        </div>
        <div style={{ maxWidth: 1100, margin: '0 auto', padding: '0 40px 80px', display: 'grid', gap: 32 }} className="ct-g">
          <div style={{ border: '1px solid var(--border)', padding: '32px', background: '#f2ede4', position: 'relative' }}>
            <div style={{ position: 'absolute', bottom: 16, right: 16, opacity: .05 }}><GeoOrn size={120} opacity={1} /></div>
            <form onSubmit={e => { e.preventDefault(); setDone(true) }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 8 }}>
                {[['Full Name', 'name', 1], ['Email', 'email', 1], ['Phone', 'phone', 1]].map(([l, k, cs]) => (
                  <div key={k} className="fw" style={{ gridColumn: `span ${cs}` }}><input className="fi" value={form[k]} onChange={e => set(k, e.target.value)} placeholder=" " /><label className="fl">{l}</label></div>
                ))}
                <div className="fw"><select className="fi" value={form.subject} onChange={e => set('subject', e.target.value)} style={{ paddingTop: 20, cursor: 'none' }}><option value=""> </option>{['Bespoke Commission', 'Product Inquiry', 'Sizing Assistance', 'Order Support', 'Press & Partnerships'].map(o => <option key={o}>{o}</option>)}</select><label className="fl" style={form.subject ? { top: 5, fontSize: 7, color: 'var(--gold)' } : {}}>Subject</label></div>
              </div>
              <div className="fw" style={{ marginBottom: 22 }}><textarea className="fi" value={form.message} onChange={e => set('message', e.target.value)} placeholder=" " rows={5} style={{ resize: 'vertical', minHeight: 110 }} /><label className="fl">Your Message</label></div>
              <button type="submit" className="solid-orn" style={{ width: '100%', padding: '15px', fontSize: 9, letterSpacing: '.22em' }}>Send Message</button>
            </form>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
            {[{ icon: '◈', t: 'Doha Atelier', ls: ['Al-Dirah Quarter, Doha', 'Kingdom of Qatar', 'Open Sun–Thu, 9am–6pm'] }, { icon: '◇', t: 'Private Appointments', ls: ['Bespoke consultations by appointment', 'In-atelier or at your residence', 'Available 7 days a week'] }, { icon: '✦', t: 'Client Services', ls: ['+966 11 XXX XXXX', 'advisors@elitecollection.sa', 'Response within 2 hours'] }].map(b => (
              <div key={b.t} style={{ padding: '22px', border: '1px solid var(--border2)', transition: 'border-color .3s', position: 'relative' }} onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--border)'} onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border2)'}>
                <div style={{ display: 'flex', gap: 12 }}><span style={{ color: 'var(--gold)', fontSize: 14, marginTop: 2, flexShrink: 0 }}>{b.icon}</span><div><div style={{ fontFamily: 'var(--fu)', fontSize: 7, letterSpacing: '.2em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 8 }}>{b.t}</div>{b.ls.map(l => <div key={l} style={{ fontFamily: 'var(--fu)', fontSize: 11, color: 'var(--ivory2)', lineHeight: 1.8 }}>{l}</div>)}</div></div>
              </div>
            ))}
            <div style={{ padding: '22px', background: '#f2ede4', border: '1px solid var(--border)', position: 'relative', overflow: 'hidden' }}>
              <div style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', opacity: .06 }}><GeoOrn size={100} opacity={1} spin /></div>
              <OrnDivider />
              <p style={{ fontFamily: 'var(--fd)', fontStyle: 'italic', fontSize: 14, color: 'var(--ivory)', lineHeight: 1.6, margin: '12px 0 10px' }}>"No inquiry is too small. No request is unreasonable. You are our guest."</p>
              <p style={{ fontFamily: 'var(--fu)', fontSize: 7, letterSpacing: '.18em', textTransform: 'uppercase', color: 'var(--dim)' }}>The Elite Promise</p>
              <div style={{ marginTop: 12 }}><OrnDivider /></div>
            </div>
          </div>
        </div>
        <style>{`@media(min-width:900px){.ct-g{grid-template-columns:1fr 340px!important;align-items:start}}`}</style>
      </div>);
    }

    /* FOOTER */
    function Footer({ setPage }) {
      const go = id => { setPage(id); window.scrollTo(0, 0) };
      return (<footer style={{ borderTop: '1px solid var(--border)', padding: '48px 40px 28px', background: '#f2ede4', position: 'relative', overflow: 'hidden' }}>
        <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none', opacity: .3 }} preserveAspectRatio="xMidYMid slice"><rect width="100%" height="100%" fill="url(#starPat)" /></svg>
        <div style={{ maxWidth: 1400, margin: '0 auto', position: 'relative', zIndex: 1 }}>
          <div style={{ marginBottom: 32 }}><OrnDivider /></div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(160px,1fr))', gap: 36, marginBottom: 40 }}>
            <div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}><GeoOrn size={24} opacity={0.7} /><div style={{ fontFamily: 'var(--fd)', fontSize: 20, color: 'var(--gold)', fontWeight: 400 }}>ELITE</div></div>
              <div style={{ fontFamily: 'var(--fu)', fontSize: 7, letterSpacing: '.3em', textTransform: 'uppercase', color: 'var(--dim)', marginBottom: 12 }}>Al-Naqsh · Arabic Leather Atelier</div>
              <p style={{ fontFamily: 'var(--fu)', fontSize: 10, color: 'var(--dim)', lineHeight: 1.8, maxWidth: 200 }}>Handcrafted in Doha since 1962. Limited to 400 pairs per year.</p>
            </div>
            {[{ t: 'Collection', ls: [['collection', 'All Pieces'], ['collection', 'New Arrivals'], ['collection', 'Signature'], ['collection', 'Limited Edition']] }, { t: 'Atelier', ls: [['story', 'Our Story'], ['story', 'Craftsmanship'], ['contact', 'Bespoke'], ['contact', 'Appointments']] }, { t: 'Client', ls: [['contact', 'Contact'], ['collection', 'Size Guide'], ['story', 'Care Guide'], ['collection', 'Returns']] }].map(col => (
              <div key={col.t}><div style={{ fontFamily: 'var(--fu)', fontSize: 7, letterSpacing: '.28em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 14 }}>{col.t}</div>
                {col.ls.map(([pg, l]) => <button key={l} onClick={() => go(pg)} style={{ display: 'block', background: 'none', border: 'none', cursor: 'none', fontFamily: 'var(--fu)', fontSize: 10, color: 'var(--dim)', textAlign: 'left', padding: '3px 0', letterSpacing: '.04em', transition: 'color .2s' }} onMouseEnter={e => e.currentTarget.style.color = 'var(--ivory2)'} onMouseLeave={e => e.currentTarget.style.color = 'var(--dim)'}>{l}</button>)}
              </div>
            ))}
          </div>
          <div style={{ marginBottom: 20 }}><OrnDivider /></div>
          <div style={{ display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
            <p style={{ fontFamily: 'var(--fu)', fontSize: 8, color: 'var(--dim)', letterSpacing: '.06em' }}>© 2026 Elite Collection · Al-Naqsh. All rights reserved.</p>
            <p style={{ fontFamily: 'var(--fu)', fontSize: 8, color: 'var(--dim)', letterSpacing: '.06em' }}>Doha ✦ Dubai ✦ Doha</p>
          </div>
        </div>
      </footer>);
    }

    /* APP */
    const TD4 =/*EDITMODE-BEGIN*/{ "accentColor": "#C4902E" }/*EDITMODE-END*/;
    function App() {
      const [page, setPage] = useState('home'); const [cart, setCart] = useState([]); const [cartOpen, setCartOpen] = useState(false); const [prod, setProd] = useState(null); const [tv, setTv] = useState(false); const [tweaks, setTweaks] = useState(TD4);
      useEffect(() => { try { const s = localStorage.getItem('v4_cart'); if (s) setCart(JSON.parse(s)) } catch (e) { } }, []);
      useEffect(() => { localStorage.setItem('v4_cart', JSON.stringify(cart)) }, [cart]);
      useEffect(() => { const h = e => { if (e.data?.type === '__activate_edit_mode') setTv(true); if (e.data?.type === '__deactivate_edit_mode') setTv(false) }; window.addEventListener('message', h); window.parent.postMessage({ type: '__edit_mode_available' }, '*'); return () => window.removeEventListener('message', h) }, []);
      useEffect(() => { document.documentElement.style.setProperty('--gold', tweaks.accentColor) }, [tweaks.accentColor]);
      const st = (k, v) => setTweaks(t => { const n = { ...t, [k]: v }; window.parent.postMessage({ type: '__edit_mode_set_keys', edits: n }, '*'); return n });
      const addToCart = item => { setCart(prev => { const key = i => i.id === item.id && i.size === item.size; const ex = prev.find(key); if (ex) return prev.map(i => key(i) ? { ...i, qty: i.qty + item.qty } : i); return [...prev, item] }); setCartOpen(true) };
      const removeFromCart = (id, size) => setCart(prev => prev.filter(i => !(i.id === id && i.size === size)));
      const cartCount = cart.reduce((s, i) => s + i.qty, 0);
      return (<>
        <style>{`:root{--gold:${tweaks.accentColor};--gold2:color-mix(in srgb,${tweaks.accentColor} 70%,#fff)}`}</style>
        <Nav page={page} setPage={setPage} cartCount={cartCount} onCart={() => setCartOpen(true)} />
        <main>
          {page === 'home' && <HomePage setPage={setPage} setProd={setProd} />}
          {page === 'collection' && <CollectionPage setPage={setPage} setProd={setProd} />}
          {page === 'product' && <ProductPage product={prod} onAdd={addToCart} setPage={setPage} />}
          {page === 'checkout' && <CheckoutPage cart={cart} setPage={setPage} />}
          {page === 'story' && <StoryPage />}
          {page === 'contact' && <ContactPage />}
        </main>
        {page !== 'checkout' && <Footer setPage={setPage} />}
        {cartOpen && <CartDrawer cart={cart} onClose={() => setCartOpen(false)} onRemove={removeFromCart} setPage={setPage} />}
        {tv && <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 300, width: 260, background: 'rgba(240,235,220,.97)', backdropFilter: 'blur(24px)', border: '1px solid var(--border)', padding: '18px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}><div style={{ display: 'flex', gap: 8, alignItems: 'center' }}><GeoOrn size={16} opacity={0.7} /><span style={{ fontFamily: 'var(--fu)', fontSize: 8, letterSpacing: '.22em', textTransform: 'uppercase', color: 'var(--gold)' }}>Tweaks</span></div><button onClick={() => { setTv(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*') }} style={{ background: 'none', border: 'none', cursor: 'none', color: 'var(--dim)', fontSize: 13 }}>✕</button></div>
          <OrnDivider />
          <div style={{ fontFamily: 'var(--fu)', fontSize: 7, letterSpacing: '.18em', textTransform: 'uppercase', color: 'var(--dim)', margin: '12px 0 8px' }}>Accent Color</div>
          <div style={{ display: 'flex', gap: 7, marginBottom: 16 }}>
            {['#C4902E', '#8A6020', '#8A9070', '#8090A0', '#A06860'].map(col => <button key={col} onClick={() => st('accentColor', col)} style={{ width: 26, height: 26, borderRadius: 0, background: col, border: 'none', cursor: 'none', outline: tweaks.accentColor === col ? `2px solid ${col}` : '2px solid transparent', outlineOffset: 2 }} />)}
            <input type="color" value={tweaks.accentColor} onChange={e => st('accentColor', e.target.value)} style={{ width: 26, height: 26, padding: 0, border: '1px solid var(--border)', background: 'none', cursor: 'pointer' }} />
          </div>
          <OrnDivider />
          <div style={{ fontFamily: 'var(--fu)', fontSize: 7, letterSpacing: '.18em', textTransform: 'uppercase', color: 'var(--dim)', margin: '12px 0 8px' }}>Jump to Page</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
            {[['home', 'Home'], ['collection', 'Collection'], ['product', 'Product'], ['checkout', 'Checkout'], ['story', 'Story'], ['contact', 'Contact']].map(([id, label]) => (
              <button key={id} onClick={() => { setPage(id); window.scrollTo(0, 0) }} style={{ padding: '6px', border: `1px solid ${page === id ? 'var(--gold)' : 'var(--border)'}`, background: page === id ? 'var(--gold3)' : 'transparent', color: page === id ? 'var(--gold)' : 'var(--dim)', fontFamily: 'var(--fu)', fontSize: 7, letterSpacing: '.1em', textTransform: 'uppercase', cursor: 'none', transition: 'all .2s' }}>{label}</button>
            ))}
          </div>
        </div>}
      </>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="80" fill="#080C18" />
      <rect width="120" height="80" fill="url(#p)" opacity="0.3" />
      <defs>
        <pattern id="p" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
          <polygon points="10,1 13,7 19,7 14,11 16,17 10,13 4,17 6,11 1,7 7,7" fill="none" stroke="#C4902E"
            stroke-width="0.4" opacity="0.4" />
        </pattern>
      </defs>
      <text x="60" y="36" text-anchor="middle" fill="#F0E8D4" font-size="20" font-family="Georgia"
        font-weight="400">ELITE</text>
      <text x="60" y="50" text-anchor="middle" fill="#C4902E" font-size="6" font-family="sans-serif"
        letter-spacing="3">AL-NAQSH</text>
      <polygon cx="60" cy="20" points="60,8 63,14 69,14 64,18 66,24 60,20 54,24 56,18 51,14 57,14" fill="none"
        stroke="#C4902E" stroke-width="0.5" opacity="0.6" />
    </svg>
  </template>
</body>

</html>
