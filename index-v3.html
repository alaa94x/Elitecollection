<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0" />
  <title>Elite — Signal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #faf8f4;
      --bg2: #f2ede4;
      --bg3: #ede7db;
      --ch: #1a1208;
      --ch2: #4a3a20;
      --ch3: rgba(201, 169, 110, 0.10);
      --gold: #B8872A;
      --dim: #8a7a60;
      --border: rgba(0, 0, 0, 0.10);
      --border2: rgba(0, 0, 0, 0.06);
      --fd: 'Instrument Serif', Georgia, serif;
      --fu: 'Space Grotesk', system-ui, sans-serif;
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: #faf8f4;
      color: var(--ch);
      font-family: var(--fu);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      cursor: none
    }

    ::-webkit-scrollbar {
      width: 3px
    }

    ::-webkit-scrollbar-track {
      background: #faf8f4
    }

    ::-webkit-scrollbar-thumb {
      background: var(--gold)
    }

    /* Cursor */
    #c {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--ch);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .2s, height .2s, background .2s
    }

    #cr {
      position: fixed;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(232, 213, 176, 0.4);
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: all .1s ease
    }

    body:has(button:hover) #c,
    body:has(a:hover) #c {
      width: 16px;
      height: 16px;
      background: var(--gold)
    }

    body:has(button:hover) #cr,
    body:has(a:hover) #cr {
      width: 60px;
      height: 60px;
      border-color: rgba(201, 169, 110, 0.3)
    }

    /* Noise */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 998;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      opacity: .45
    }

    /* Stroke text for light bg */
    .stroke {
      -webkit-text-stroke: 1px var(--ch2);
      color: transparent;
      font-family: var(--fd)
    }

    .stroke-gold {
      -webkit-text-stroke: 1px var(--gold);
      color: transparent;
      font-family: var(--fd)
    }

    /* Ticker */
    @keyframes tk {
      from {
        transform: translateX(0)
      }

      to {
        transform: translateX(-50%)
      }
    }

    .tk-inner {
      display: inline-flex;
      white-space: nowrap;
      animation: tk 28s linear infinite
    }

    /* Anims */
    @keyframes fu {
      from {
        opacity: 0;
        transform: translateY(28px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fi {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes lg {
      from {
        transform: scaleX(0);
        transform-origin: left
      }

      to {
        transform: scaleX(1);
        transform-origin: left
      }
    }

    @keyframes nf {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-10px)
      }
    }

    .afu {
      animation: fu .8s cubic-bezier(.22, 1, .36, 1) both
    }

    .afi {
      animation: fi .6s ease both
    }

    /* Magnetic button */
    .mag-btn {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid rgba(232, 213, 176, 0.3);
      color: var(--ch2);
      font-family: var(--fu);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      padding: 14px 32px;
      cursor: none;
      transition: color .4s, border-color .4s;
    }

    .mag-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--ch);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .4s cubic-bezier(.22, 1, .36, 1)
    }

    .mag-btn:hover {
      color: #faf8f4;
      border-color: var(--ch)
    }

    .mag-btn:hover::before {
      transform: scaleX(1)
    }

    .mag-btn span {
      position: relative;
      z-index: 1
    }

    .mag-btn-gold {
      border-color: var(--gold);
      color: var(--gold)
    }

    .mag-btn-gold::before {
      background: var(--gold)
    }

    .mag-btn-gold:hover {
      color: #faf8f4
    }

    /* Solid btn */
    .solid-btn {
      background: var(--ch);
      color: #faf8f4;
      font-family: var(--fu);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .22em;
      text-transform: uppercase;
      border: none;
      padding: 16px 40px;
      cursor: none;
      transition: background .3s
    }

    .solid-btn:hover {
      background: var(--gold)
    }

    /* Float input */
    .fw {
      position: relative
    }

    .fi-inp {
      width: 100%;
      background: #f2ede4;
      border: 1px solid var(--border);
      color: var(--ch);
      font-family: var(--fu);
      font-size: 13px;
      font-weight: 300;
      padding: 20px 16px 8px;
      outline: none;
      transition: border-color .3s;
      -webkit-appearance: none
    }

    .fi-inp:focus {
      border-color: var(--gold)
    }

    .fi-lbl {
      position: absolute;
      left: 16px;
      top: 14px;
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--dim);
      pointer-events: none;
      transition: all .25s
    }

    .fi-inp:focus~.fi-lbl,
    .fi-inp:not(:placeholder-shown)~.fi-lbl {
      top: 5px;
      font-size: 7px;
      color: var(--gold)
    }

    /* Hr */
    .hr {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent)
    }

    /* Tag */
    .tag {
      display: inline-block;
      padding: 3px 10px;
      border: 1px solid rgba(201, 169, 110, .3);
      font-family: var(--fu);
      font-size: 8px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold)
    }

    /* Acc */
    .acc-b {
      max-height: 0;
      overflow: hidden;
      transition: max-height .5s cubic-bezier(.22, 1, .36, 1)
    }

    .acc-b.open {
      max-height: 400px
    }

    /* Size btn */
    .sz {
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ch2);
      font-family: var(--fu);
      font-size: 12px;
      cursor: none;
      transition: all .25s
    }

    .sz:hover {
      border-color: var(--gold);
      color: var(--gold)
    }

    .sz.on {
      border-color: var(--gold);
      background: var(--ch3);
      color: var(--gold)
    }

    /* Cart */
    .c-ov {
      position: fixed;
      inset: 0;
      background: rgba(20, 14, 6, .45);
      backdrop-filter: blur(10px);
      z-index: 200;
      animation: fi .3s ease
    }

    .c-dr {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: min(420px, 100vw);
      background: rgba(250, 248, 244, .98);
      border-left: 1px solid var(--border);
      animation: slideR .5s cubic-bezier(.22, 1, .36, 1);
      display: flex;
      flex-direction: column
    }

    @keyframes slideR {
      from {
        transform: translateX(100%)
      }

      to {
        transform: translateX(0)
      }
    }

    /* Dot */
    .gdot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--dim);
      cursor: none;
      transition: all .3s;
      border: none
    }

    .gdot.on {
      background: var(--ch);
      width: 18px;
      border-radius: 2px
    }

    /* Filter pill */
    .fp {
      padding: 8px 18px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--dim);
      font-family: var(--fu);
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
      cursor: none;
      transition: all .25s;
      white-space: nowrap
    }

    .fp:hover {
      border-color: var(--border);
      color: var(--ch2)
    }

    .fp.on {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--ch3)
    }

    /* Mobile nav */
    .mob-nav {
      position: fixed;
      inset: 0;
      background: #faf8f4;
      z-index: 180;
      animation: fi .3s ease
    }

    /* Marquee */
    @keyframes mq {
      from {
        transform: translateX(0)
      }

      to {
        transform: translateX(-50%)
      }
    }

    .mq-i {
      animation: mq 22s linear infinite
    }

    /* Step */
    .sdot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      border: 1px solid var(--border);
      color: var(--dim);
      transition: all .3s
    }

    .sdot.act {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--ch3)
    }

    .sdot.done {
      background: var(--gold);
      border-color: var(--gold);
      color: #faf8f4
    }

    @media(max-width:767px) {
      body {
        cursor: auto
      }

      #c,
      #cr {
        display: none
      }
    }
  </style>
</head>

<body>
  <div id="c"></div>
  <div id="cr"></div>
  <div id="root"></div>
  <script>
    const c = document.getElementById('c'), cr = document.getElementById('cr');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; c.style.left = mx + 'px'; c.style.top = my + 'px' });
    (function loop() { rx += (mx - rx) * .1; ry += (my - ry) * .1; cr.style.left = rx + 'px'; cr.style.top = ry + 'px'; requestAnimationFrame(loop) })();
  </script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const IMGS = {
      oxford: 'https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=800&q=85&auto=format&fit=crop',
      derby: 'https://images.unsplash.com/photo-1533867617858-e7b97e060509?w=800&q=85&auto=format&fit=crop',
      loafer: 'https://images.unsplash.com/photo-1600269452121-4f2416e55c28?w=800&q=85&auto=format&fit=crop',
      boot: 'https://images.unsplash.com/photo-1560343776-97e7d202ff0e?w=800&q=85&auto=format&fit=crop',
      mule: 'https://images.unsplash.com/photo-1560343776-97e7d202ff0e?w=800&q=85&auto=format&fit=crop',
      chelsea: 'https://images.unsplash.com/photo-1518639192441-8fce0a366e2e?w=800&q=85&auto=format&fit=crop',
    };

    const PRODUCTS = [
      { id: 1, name: 'Al-Mahmal Oxford', price: 2800, tag: 'Signature', leather: 'Camel Nappa', style: 'Oxford', sizes: [40, 41, 42, 43, 44, 45], image: IMGS.oxford, num: '001' },
      { id: 2, name: 'Najd Derby', price: 2200, tag: 'New', leather: 'Goat Suede', style: 'Derby', sizes: [39, 40, 41, 42, 43, 44], image: IMGS.derby, num: '002' },
      { id: 3, name: 'Hijaz Loafer', price: 1950, tag: 'Bestseller', leather: 'Calf Leather', style: 'Loafer', sizes: [40, 41, 42, 43, 44], image: IMGS.loafer, num: '003' },
      { id: 4, name: 'Rub Al Khali Boot', price: 3400, tag: 'Limited', leather: 'Camel Full-Grain', style: 'Boot', sizes: [41, 42, 43, 44, 45], image: IMGS.boot, num: '004' },
      { id: 5, name: 'Medina Mule', price: 1600, tag: '', leather: 'Goat Suede', style: 'Loafer', sizes: [39, 40, 41, 42, 43], image: IMGS.mule, num: '005' },
      { id: 6, name: 'Quraish Chelsea', price: 2650, tag: 'New', leather: 'Calf Leather', style: 'Boot', sizes: [40, 41, 42, 43, 44, 45], image: IMGS.chelsea, num: '006' },
    ];

    const GALLERY = [IMGS.oxford, IMGS.derby, IMGS.loafer, IMGS.boot];

    // Magnetic hook
    function useMag(str = 0.25) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current; if (!el) return;
        const mv = e => { const r = el.getBoundingClientRect(); const x = e.clientX - r.left - r.width / 2; const y = e.clientY - r.top - r.height / 2; el.style.transform = `translate(${x * str}px,${y * str}px)`; el.style.transition = 'transform .1s ease' };
        const ml = () => { el.style.transform = 'translate(0,0)'; el.style.transition = 'transform .5s cubic-bezier(.22,1,.36,1)' };
        el.addEventListener('mousemove', mv); el.addEventListener('mouseleave', ml);
        return () => { el.removeEventListener('mousemove', mv); el.removeEventListener('mouseleave', ml) };
      }, []);
      return ref;
    }

    /* ── NAV ── */
    function Nav({ page, setPage, cartCount, onCart }) {
      const [sc, setSc] = useState(false); const [mob, setMob] = useState(false);
      useEffect(() => { const h = () => setSc(window.scrollY > 40); window.addEventListener('scroll', h); return () => window.removeEventListener('scroll', h) }, []);
      const go = id => { setPage(id); setMob(false); window.scrollTo(0, 0) };
      return (<>
        <nav style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 150, padding: '18px 40px', background: sc ? 'rgba(250,248,244,0.85)' : 'transparent', backdropFilter: sc ? 'blur(20px)' : 'none', borderBottom: sc ? '1px solid var(--border)' : '1px solid transparent', transition: 'all .4s', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <button onClick={() => go('home')} style={{ background: 'none', border: 'none', cursor: 'none', padding: 0 }}>
            <div style={{ fontFamily: 'var(--fd)', fontSize: 18, letterSpacing: '.14em', color: 'var(--ch)', fontStyle: 'italic' }}>Elite</div>
            <div style={{ fontFamily: 'var(--fu)', fontSize: 7, letterSpacing: '.4em', color: 'var(--dim)', textTransform: 'uppercase', marginTop: 1 }}>Arabic Leather · Since 1962</div>
          </button>
          <div style={{ display: 'flex', gap: 36 }} className="dn">
            {[['collection', 'Collection'], ['story', 'Story'], ['contact', 'Contact']].map(([id, l]) => (
              <button key={id} onClick={() => go(id)} style={{ background: 'none', border: 'none', cursor: 'none', fontFamily: 'var(--fu)', fontSize: 10, letterSpacing: '.18em', textTransform: 'uppercase', fontWeight: page === id ? 500 : 300, color: page === id ? 'var(--ch)' : 'var(--dim)', transition: 'color .25s', position: 'relative', padding: '4px 0' }}>
                {l}{page === id && <span style={{ position: 'absolute', bottom: -3, left: 0, right: 0, height: '1px', background: 'var(--ch)', animation: 'lg .4s ease' }} />}
              </button>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 18, alignItems: 'center' }}>
            <button onClick={onCart} style={{ background: 'none', border: 'none', cursor: 'none', position: 'relative', padding: 4 }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ch)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" /><line x1="3" y1="6" x2="21" y2="6" /><path d="M16 10a4 4 0 01-8 0" /></svg>
              {cartCount > 0 && <span style={{ position: 'absolute', top: -2, right: -2, width: 15, height: 15, borderRadius: '50%', background: 'var(--gold)', color: '#faf8f4', fontSize: 8, fontFamily: 'var(--fu)', fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{cartCount}</span>}
            </button>
            <button onClick={() => setMob(true)} className="ham" style={{ background: 'none', border: 'none', cursor: 'none', padding: 4, display: 'flex', flexDirection: 'column', gap: 5 }}>
              <span style={{ display: 'block', width: 22, height: 1, background: 'var(--ch)' }} />
              <span style={{ display: 'block', width: 14, height: 1, background: 'var(--gold)' }} />
            </button>
          </div>
        </nav>
        {mob && <div className="mob-nav" style={{ display: 'flex', flexDirection: 'column', padding: '80px 40px 40px' }}>
          <button onClick={() => setMob(false)} style={{ position: 'absolute', top: 24, right: 28, background: 'none', border: 'none', cursor: 'none', color: 'var(--dim)', fontSize: 22 }}>✕</button>
          {[['home', 'Atelier'], ['collection', 'Collection'], ['story', 'Story'], ['contact', 'Contact']].map(([id, l], i) => (
            <button key={id} onClick={() => go(id)} className="afu" style={{ background: 'none', border: 'none', cursor: 'none', textAlign: 'left', fontFamily: 'var(--fd)', fontStyle: 'italic', fontSize: 'clamp(40px,9vw,80px)', fontWeight: 300, color: page === id ? 'var(--gold)' : 'var(--ch)', padding: '4px 0', animationDelay: `${i * .07}s`, transition: 'color .25s' }}>{l}</button>
          ))}
        </div>}
        <style>{`@media(min-width:768px){.ham{display:none!important}}@media(max-width:767px){.dn{display:none!important}}`}</style>
      </>);
    }

    /* ── HOME ── */
    function HomePage({ setPage, setProd }) {
      const m1 = useMag(.3); const m2 = useMag(.3);
      return (<div>
        {/* HERO */}
        <section style={{ minHeight: '100vh', position: 'relative', overflow: 'hidden', background: 'linear-gradient(160deg,#faf8f4 0%,#f0ead8 60%,#faf8f4 100%)', display: 'flex', flexDirection: 'column' }}>
          {/* BG texture lines */}
          {[25, 50, 75].map(p => (
            <div key={p} style={{ position: 'absolute', top: 0, bottom: 0, left: `${p}%`, width: '1px', background: `linear-gradient(to bottom,transparent,rgba(232,213,176,.04),transparent)`, pointerEvents: 'none' }} />
          ))}

          <div style={{ flex: 1, display: 'grid', alignItems: 'center', padding: '100px 40px 60px', maxWidth: 1440, margin: '0 auto', width: '100%', gap: 0 }} className="hero-g">
            {/* Left: Text block */}
            <div style={{ zIndex: 2, paddingRight: 40 }}>
              {/* Huge outlined ELITE */}
              <div className="afu stroke" style={{ animationDelay: '.1s', fontSize: 'clamp(80px,14vw,200px)', fontStyle: 'italic', lineHeight: .85, letterSpacing: '-.02em', marginBottom: 0, userSelect: 'none' }}>
                ELITE
              </div>
              <div className="afu" style={{ animationDelay: '.25s' }}>
                <h1 style={{ fontFamily: 'var(--fd)', fontSize: 'clamp(28px,4.5vw,60px)', fontWeight: 300, fontStyle: 'italic', color: 'var(--ch)', lineHeight: 1.05, letterSpacing: '-.01em' }}>
                  Where Heritage<br />Meets Sole.
                </h1>
              </div>
              <div style={{ width: 80, height: 1, background: 'var(--gold)', opacity: .5, margin: '24px 0', animationDelay: '.4s' }} className="afu" />
              <p className="afu" style={{ animationDelay: '.45s', fontFamily: 'var(--fu)', fontSize: 13, lineHeight: 1.9, color: 'var(--dim)', maxWidth: 360, marginBottom: 36 }}>
                Each pair requires 48 hours of unbroken attention from a single master. Limited to 400 per year.
              </p>
              <div className="afu" style={{ animationDelay: '.55s', display: 'flex', gap: 12, flexWrap: 'wrap' }}>
                <div ref={m1}>
                  <button className="mag-btn mag-btn-gold" onClick={() => { setPage('collection'); window.scrollTo(0, 0) }}><span>Explore Collection</span></button>
                </div>
                <div ref={m2}>
                  <button className="mag-btn" onClick={() => { setPage('story'); window.scrollTo(0, 0) }}><span>Our Story</span></button>
                </div>
              </div>
              {/* Stats */}
              <div className="afu" style={{ animationDelay: '.65s', display: 'flex', gap: 32, marginTop: 48, paddingTop: 24, borderTop: '1px solid var(--border2)', flexWrap: 'wrap' }}>
                {[['60+', 'Years'], ['12', 'Masters'], ['400', 'Pairs/yr'], ['48h', 'Per Pair']].map(([n, l]) => (
                  <div key={l}>
                    <div style={{ fontFamily: 'var(--fd)', fontStyle: 'italic', fontSize: 28, color: 'var(--gold)', lineHeight: 1 }}>{n}</div>
                    <div style={{ fontFamily: 'var(--fu)', fontSize: 8, letterSpacing: '.2em', textTransform: 'uppercase', color: 'var(--dim)', marginTop: 3 }}>{l}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Right: 3D viewer */}

          {[{ t: 'Collection', ls: [['collection', 'All Pieces'], ['collection', 'New Arrivals'], ['collection', 'Signature'], ['collection', 'Limited Edition']] }, { t: 'Atelier', ls: [['story', 'Our Story'], ['story', 'Craftsmanship'], ['contact', 'Bespoke'], ['contact', 'Appointments']] }, { t: 'Client', ls: [['contact', 'Contact'], ['collection', 'Size Guide'], ['story', 'Care Guide'], ['collection', 'Returns']] }].map(col => (
            <div key={col.t}><div style={{ fontFamily: 'var(--fu)', fontSize: 7, letterSpacing: '.28em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 14 }}>{col.t}</div>
              {col.ls.map(([pg, l]) => <button key={l} onClick={() => go(pg)} style={{ display: 'block', background: 'none', border: 'none', cursor: 'none', fontFamily: 'var(--fu)', fontSize: 10, color: 'var(--dim)', textAlign: 'left', padding: '3px 0', letterSpacing: '.04em', transition: 'color .2s' }} onMouseEnter={e => e.currentTarget.style.color = 'var(--ch2)'} onMouseLeave={e => e.currentTarget.style.color = 'var(--dim)'}>{l}</button>)}
            </div>
          ))}
        </div>
        <div className="hr" style={{ marginBottom: 20 }} />
        <div style={{ display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
          <p style={{ fontFamily: 'var(--fu)', fontSize: 8, color: 'var(--dim)', letterSpacing: '.06em' }}>© 2026 Elite Collection. All rights reserved.</p>
          <p style={{ fontFamily: 'var(--fu)', fontSize: 8, color: 'var(--dim)', letterSpacing: '.06em' }}>Doha · Dubai · Doha</p>
        </div>
      </footer>);
    }

    /* ── APP ── */
    const TD =/*EDITMODE-BEGIN*/{
      "accentColor": "#C9A96E"
    }/*EDITMODE-END*/;
    function App() {
      const [page, setPage] = useState('home'); const [cart, setCart] = useState([]); const [cartOpen, setCartOpen] = useState(false); const [prod, setProd] = useState(null); const [tv, setTv] = useState(false); const [tweaks, setTweaks] = useState(TD);
      useEffect(() => { try { const s = localStorage.getItem('v3_cart'); if (s) setCart(JSON.parse(s)) } catch (e) { } }, []);
      useEffect(() => { localStorage.setItem('v3_cart', JSON.stringify(cart)) }, [cart]);
      useEffect(() => { const h = e => { if (e.data?.type === '__activate_edit_mode') setTv(true); if (e.data?.type === '__deactivate_edit_mode') setTv(false) }; window.addEventListener('message', h); window.parent.postMessage({ type: '__edit_mode_available' }, '*'); return () => window.removeEventListener('message', h) }, []);
      useEffect(() => { document.documentElement.style.setProperty('--gold', tweaks.accentColor) }, [tweaks.accentColor]);
      const st = (k, v) => setTweaks(t => { const n = { ...t, [k]: v }; window.parent.postMessage({ type: '__edit_mode_set_keys', edits: n }, '*'); return n });
      const addToCart = item => { setCart(prev => { const key = i => i.id === item.id && i.size === item.size; const ex = prev.find(key); if (ex) return prev.map(i => key(i) ? { ...i, qty: i.qty + item.qty } : i); return [...prev, item] }); setCartOpen(true) };
      const removeFromCart = (id, size) => setCart(prev => prev.filter(i => !(i.id === id && i.size === size)));
      const cartCount = cart.reduce((s, i) => s + i.qty, 0);
      return (<>
        <style>{`:root{--gold:${tweaks.accentColor}}`}</style>
        <Nav page={page} setPage={setPage} cartCount={cartCount} onCart={() => setCartOpen(true)} />
        <main>
          {page === 'home' && <HomePage setPage={setPage} setProd={setProd} />}
          {page === 'collection' && <CollectionPage setPage={setPage} setProd={setProd} />}
          {page === 'product' && <ProductPage product={prod} onAdd={addToCart} setPage={setPage} />}
          {page === 'checkout' && <CheckoutPage cart={cart} setPage={setPage} />}
          {page === 'story' && <StoryPage />}
          {page === 'contact' && <ContactPage />}
        </main>
        {page !== 'checkout' && <Footer setPage={setPage} />}
        {cartOpen && <CartDrawer cart={cart} onClose={() => setCartOpen(false)} onRemove={removeFromCart} setPage={setPage} />}
        {tv && <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 300, width: 250, background: 'rgba(14,13,11,.97)', backdropFilter: 'blur(24px)', border: '1px solid var(--border)', padding: '18px', boxShadow: '0 20px 60px rgba(0,0,0,.7)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 18 }}><span style={{ fontFamily: 'var(--fu)', fontSize: 8, letterSpacing: '.22em', textTransform: 'uppercase', color: 'var(--gold)' }}>Tweaks</span><button onClick={() => { setTv(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*') }} style={{ background: 'none', border: 'none', cursor: 'none', color: 'var(--dim)', fontSize: 13 }}>✕</button></div>
          <div style={{ fontFamily: 'var(--fu)', fontSize: 8, letterSpacing: '.15em', textTransform: 'uppercase', color: 'var(--dim)', marginBottom: 8 }}>Accent Color</div>
          <div style={{ display: 'flex', gap: 7, marginBottom: 18 }}>
            {['#C9A96E', '#9A7535', '#8A9F8A', '#8A8FA0', '#A07878'].map(col => <button key={col} onClick={() => st('accentColor', col)} style={{ width: 26, height: 26, borderRadius: '50%', background: col, border: 'none', cursor: 'none', outline: tweaks.accentColor === col ? `2px solid ${col}` : '2px solid transparent', outlineOffset: 2 }} />)}
            <input type="color" value={tweaks.accentColor} onChange={e => st('accentColor', e.target.value)} style={{ width: 26, height: 26, padding: 0, border: '1px solid var(--border)', background: 'none', cursor: 'pointer', borderRadius: '50%' }} />
          </div>
          <div className="hr" style={{ marginBottom: 14 }} />
          <div style={{ fontFamily: 'var(--fu)', fontSize: 8, letterSpacing: '.15em', textTransform: 'uppercase', color: 'var(--dim)', marginBottom: 8 }}>Jump to Page</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
            {[['home', 'Home'], ['collection', 'Collection'], ['product', 'Product'], ['checkout', 'Checkout'], ['story', 'Story'], ['contact', 'Contact']].map(([id, label]) => (
              <button key={id} onClick={() => { setPage(id); window.scrollTo(0, 0) }} style={{ padding: '6px', border: `1px solid ${page === id ? 'var(--gold)' : 'var(--border)'}`, background: page === id ? 'var(--ch3)' : 'transparent', color: page === id ? 'var(--gold)' : 'var(--dim)', fontFamily: 'var(--fu)', fontSize: 8, letterSpacing: '.1em', textTransform: 'uppercase', cursor: 'none', transition: 'all .2s' }}>{label}</button>
            ))}
          </div>
        </div>}
      </>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="80" fill="#080807" />
      <text x="8" y="56" fill="none" stroke="#E8D5B0" stroke-width="0.5" font-size="40" font-family="Georgia"
        font-style="italic" opacity="0.5">ELITE</text>
      <text x="8" y="26" fill="#C9A96E" font-size="8" font-family="Georgia" font-style="italic">Where Heritage Meets
        Sole</text>
      <line x1="8" y1="30" x2="60" y2="30" stroke="#C9A96E" stroke-width="0.5" opacity="0.4" />
    </svg>
  </template>
</body>

</html>
